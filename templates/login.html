{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 auth-card">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="auth-icon-wrapper mb-3">
                        <i class="fas fa-sign-in-alt fa-2x text-gradient"></i>
                    </div>
                    <h2 class="fw-bold text-white">Welcome Back</h2>
                    <p class="text-light opacity-75">Sign in to your wellness dashboard</p>
                </div>

                <!-- Login Form -->
                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-3">
                        <label for="username" class="form-label text-light">
                            <i class="fas fa-user me-1"></i>Username
                        </label>
                        <input type="text" class="form-control glass-input" id="username" name="username"
                               placeholder="Enter your username" required autocomplete="username">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-light">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control glass-input" id="password" name="password"
                                   placeholder="Enter your password" required autocomplete="current-password">
                            <button class="btn btn-outline-light border-0" type="button" onclick="togglePassword('password')">
                                <i class="fas fa-eye" id="password-eye"></i>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-glow w-100 py-2 mt-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <!-- Register Link -->
                <div class="text-center mt-4">
                    <p class="text-light opacity-75 mb-0">
                        Don't have an account?
                        <a href="{{ url_for('register') }}" class="text-gradient fw-bold text-decoration-none">
                            Register here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
