{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-5 auth-card">
                <!-- Header -->
                <div class="text-center mb-4">
                    <div class="auth-icon-wrapper mb-3">
                        <i class="fas fa-user-plus fa-2x text-gradient"></i>
                    </div>
                    <h2 class="fw-bold text-white">Create Account</h2>
                    <p class="text-light opacity-75">Join the mental wellness platform</p>
                </div>

                <!-- Register Form -->
                <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                    <div class="mb-3">
                        <label for="username" class="form-label text-light">
                            <i class="fas fa-user me-1"></i>Username
                        </label>
                        <input type="text" class="form-control glass-input" id="username" name="username"
                               placeholder="Choose a username" required minlength="3" autocomplete="username">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label text-light">
                            <i class="fas fa-envelope me-1"></i>Email
                        </label>
                        <input type="email" class="form-control glass-input" id="email" name="email"
                               placeholder="Enter your email" required autocomplete="email">
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label text-light">
                            <i class="fas fa-lock me-1"></i>Password
                        </label>
                        <div class="input-group">
                            <input type="password" class="form-control glass-input" id="password" name="password"
                                   placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
                            <button class="btn btn-outline-light border-0" type="button" onclick="togglePassword('password')">
                                <i class="fas fa-eye" id="password-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="confirm_password" class="form-label text-light">
                            <i class="fas fa-lock me-1"></i>Confirm Password
                        </label>
                        <input type="password" class="form-control glass-input" id="confirm_password" name="confirm_password"
                               placeholder="Re-enter password" required minlength="6" autocomplete="new-password">
                    </div>

                    <button type="submit" class="btn btn-glow w-100 py-2 mt-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>

                <!-- Login Link -->
                <div class="text-center mt-4">
                    <p class="text-light opacity-75 mb-0">
                        Already have an account?
                        <a href="{{ url_for('login') }}" class="text-gradient fw-bold text-decoration-none">
                            Sign in here
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
